<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .project {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 20px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .project:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    border-color: #d1d5db;
    }

    .project-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 6px;
    }

    .project-description {
    font-size: 0.95rem;
    color: #555;
    margin-bottom: 12px;
    line-height: 1.5;
    }

    .project-meta {
    margin-bottom: 12px;
    }

    .project-tag {
    display: inline-block;
    font-size: 0.75rem;
    background: #eef2ff;
    color: #3730a3;
    padding: 3px 8px;
    border-radius: 999px;
    margin-right: 6px;
    }

    .project-links a {
    display: inline-block;
    font-size: 0.9rem;
    font-weight: 500;
    color: #0366d6;
    text-decoration: none;
    border: 1px solid #0366d6;
    padding: 5px 10px;
    border-radius: 6px;
    transition: background 0.15s ease, color 0.15s ease;
    }

    .project-links a:hover {
    background: #0366d6;
    color: white;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      line-height: 1.6;
      background: #f9fafb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    a {
      color: #0366d6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .profile {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: center;
      margin-bottom: 50px;
    }

    .profile-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ddd;
    }

    .profile-text {
      flex: 1;
      min-width: 250px;
    }

    .social-links {
      margin-top: 15px;
    }

    .social-links a {
      margin-right: 15px;
      font-weight: 500;
    }

    .social-links img {
      margin-right: 15px;
      height: 40px
    }

    .publication {
      margin-bottom: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .publication-title {
      font-weight: 600;
    }

    .publication-authors {
      font-size: 0.95em;
      color: #555;
    }

    .publication-venue {
      font-size: 0.9em;
      color: #777;
    }

    footer {
      margin-top: 60px;
      text-align: center;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Profile Section -->
    <section class="profile">
      <img class="profile-img" src="{{ site.profile_image | default: '/assets/profile.jpeg' }}" alt="Profile picture">

      <div class="profile-text">
        <h1>{{ site.title }}</h1>

        <p>{{ site.description }}</p>

        <div class="social-links">
          {% for link in site.minima.social_links %}
            <a href="{{ link.url }}" target="_blank"><img src="/assets/icons/{{ link.icon }}.svg" alt="{{ link.title }}"></a>
          {% endfor %}
        </div>
      </div>
    </section>

    <!-- Page Content -->
    {{ content }}

    <footer>
      © {{ site.time | date: "%Y" }} {{ site.title }}
    </footer>

  </div>
</body>
</html>
